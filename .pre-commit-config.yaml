repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff format
        name: ruff format
        entry: uv run ruff format --force-exclude
        types: [python]
        language: system

      - id: ruff check
        name: ruff check
        entry: uv run ruff check --fix --force-exclude
        types: [python]
        language: system

      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true

      - id: uv-lock
        name: uv lock check
        entry: uv lock --check
        files: ^(pyproject\.toml|uv\.lock)$
        language: system
        pass_filenames: false

      - id: zizmor
        name: zizmor
        entry: uv run zizmor --fix=all --no-progress
        types: [yaml]
        files: \.github/(workflows/.*|dependabot\.ya?ml)$
        language: system
        require_serial: true
